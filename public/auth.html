<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Next Room</title>
        <link rel="stylesheet" href="./styles/globals.css" />
        <link rel="stylesheet" href="./styles/index.css" />
        <script
            src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"
            integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        ></script>
        <script src="./js/app.js"></script>
    </head>
    <body>
        <nav class="flex-center">
            <div class="nav-left">
                <a href="/" class="row-center">
                    <img id="nav-logo" src="./assets/logo.png" />
                    <p>Next Room</p>
                </a>
            </div>
            <div class="nav-right flex-row">
                <button>New Meeting</button>
                <button>Sign In</button>
                <div class="mid-center user-initials">
                    <p>IR</p>
                </div>
            </div>
        </nav>
        <main class="flex-row two-cols">
            <div class="left-col flex-col">
                <h2>Welcome to Auth</h2>

                <div class="tabs">
                    <button id="signin-tab">Sign In</button>
                    <button id="signup-tab">Sign Up</button>
                </div>

                <div class="tab-content">
                    <div id="signin-tab-content">
                        <h2>Sign In</h2>
                    </div>
                    <div id="signup-tab-content">
                        <h2>Sign Up</h2>
                    </div>
                </div>
            </div>
            <div class="right-col"></div>
        </main>
    </body>
</html>
