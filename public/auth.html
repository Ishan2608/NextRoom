<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Next Room</title>
        <link rel="stylesheet" href="./styles/globals.css" />
        <link rel="stylesheet" href="./styles/index.css" />
        <script
            src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"
            integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        ></script>
        <script src="./js/app.js"></script>
    </head>
    <body>
        <nav class="flex-center">
            <div class="nav-left">
                <a href="/" class="row-center">
                    <img id="nav-logo" src="./assets/logo.png" />
                    <p class="nav-title">Next Room</p>
                </a>
            </div>
            <div class="nav-right flex-row">
                <button>New Meeting</button>
                <button>Sign In</button>
                <div class="mid-center user-initials">
                    <p>IR</p>
                </div>
            </div>
        </nav>
        <main class="flex-row two-cols">
            <div id="auth-main-left" class="flex-col">
                <div class="tabs flex-row">
                    <p id="signin-tab" class="txt-nm tab active">Sign In</p>
                    <p id="signup-tab" class="txt-nm tab">Sign Up</p>
                </div>

                <div class="tab-content">
                    <div id="signin-tab-content">
                        <form class="flex-col">
                            <div class="field flex-col">
                                <label>Email</label>
                                <input
                                    id="signin-email"
                                    type="email"
                                    name="signin-email"
                                />
                            </div>
                            <div class="field flex-col"></div>
                            <label>Password</label>
                            <input
                                id="signin-pass"
                                type="password"
                                name="signin-password"
                            />
                            <button>Login</button>
                        </form>
                    </div>
                    <div id="signup-tab-content">
                        <form class="flex-col">
                            <div class="field flex-col">
                                <label>Username</label>
                                <input
                                    id="signup-username"
                                    type="text"
                                    name="username"
                                />
                            </div>
                            <div class="field flex-col">
                                <label>Email</label>
                                <input
                                    id="signup-email"
                                    type="email"
                                    name="signup-email"
                                />
                            </div>
                            <div class="field flex-col">
                                <label>Password</label>
                                <input
                                    id="signup-password"
                                    type="password"
                                    name="signup-password"
                                />
                            </div>
                            <div class="field flex-col">
                                <label>Confirm Password</label>
                                <input
                                    id="confirm-password"
                                    type="password"
                                    name="confirm-password"
                                />
                            </div>
                            <button>Register</button>
                        </form>
                    </div>
                </div>
            </div>
            <div class="right-col"></div>
        </main>
    </body>
</html>
